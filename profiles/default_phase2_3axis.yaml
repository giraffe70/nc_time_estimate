machine_name: "Default Phase 2 3-Axis CNC"
controller_name: "generic_phase2"
kinematic_type: "3_axis"
units: "mm"
feed_unit: "auto"

axes:
  X:
    rapid_velocity_mm_min: 10000
    max_velocity_mm_min: 12000
    max_acc_mm_s2: 1000
    max_jerk_mm_s3: 10000
  Y:
    rapid_velocity_mm_min: 10000
    max_velocity_mm_min: 12000
    max_acc_mm_s2: 1000
    max_jerk_mm_s3: 10000
  Z:
    rapid_velocity_mm_min: 5000
    max_velocity_mm_min: 10000
    max_acc_mm_s2: 800
    max_jerk_mm_s3: 8000

rapid_feed_mm_min: 10000
max_cut_feed_mm_min: 10000
default_cut_feed_mm_min: 1000
default_cut_acc_mm_s2: 800
default_cut_jerk_mm_s3: 10000
arc_tolerance_mm: 0.01
arc_chord_tolerance_mm: 0.02

controller:
  interpolation_period_ms: 2
  lookahead_blocks: 100
  junction_tolerance_mm: 0.01
  same_direction_angle_threshold_deg: 1.0
  reverse_angle_threshold_deg: 1.0
  lookahead_max_iterations: 8
  velocity_tolerance_mm_s: 0.0001
  phase2_max_samples_per_block: 1000
  dwell_p_unit: "ms"
  dwell_x_unit: "sec"

event_time:
  tool_change_sec: 8.0
  spindle_start_sec: 2.0
  spindle_stop_sec: 1.0
  coolant_on_sec: 0.5
  coolant_off_sec: 0.5
  optional_stop_sec: 0.0

cycle:
  peck_clearance_mm: 1.0

time_model:
  mode: "phase2"

reference_return:
  mode: "unestimated"
  fixed_time_sec: 0.0
  position:
    X: 0.0
    Y: 0.0
    Z: 0.0
